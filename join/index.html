<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 反射XSS対策: インライン script/style を全面禁止（JS/CSS は外部ファイルのみ）。
       ?code= はブラウザ側 join.js で regex 検証し、DOM へは textContent でのみ流す。 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'; object-src 'none'">
  <!-- 招待コード（bearer）を Referer で外部に漏らさない -->
  <meta name="referrer" content="no-referrer">
  <meta name="version" content="1.1.0">
  <title>グループに参加 - 痩せないと</title>
  <!-- 配置: ディレクトリ方式（join/index.html）。/join への直リンクは GitHub Pages が
       /join/ へ 301 するが、query は保持される（2026-07-05 に本サイトの /privacy?code=...
       で実測: location: /privacy/?code=... と返る）。拡張子なし join.html 方式は
       「/join がそれを返す保証」を deploy 前に実測できないため採らない。
       AASA 側は /join と /join/* の両方をカバー済み。 -->
  <link rel="stylesheet" href="/join/join.css">
</head>
<body>
  <h1>痩せないと</h1>
  <p class="tag">友達と“一緒に”続けるダイエットアプリ</p>

  <!-- JS 無効・実行失敗環境でも参加手段が途絶えないための静的フォールバック -->
  <noscript>
    <div class="err-box">
      <p>このページの自動表示には JavaScript が必要みたい。</p>
      <p>大丈夫、招待してくれた友達に「合言葉」を直接聞いて、下の手順で参加できるよ。</p>
    </div>
  </noscript>

  <!-- 有効な ?code= があるときだけ join.js が表示する -->
  <section id="invite" hidden>
    <div class="invite-box">
      <p class="invite-title">友達があなたをグループに招待しています</p>
      <p id="code-text" class="code-big"></p>
      <!-- copy-first: アプリを入れる前にコピーしておくと、初回起動時にアプリが
           クリップボードから合言葉を検出して参加画面へ自動で誘導する(N1 deferred link)。 -->
      <p class="copy-lead">① まず合言葉をコピーしてね(アプリを入れる前に!)</p>
      <button id="copy-btn" type="button" class="copy-btn">合言葉をコピー</button>
    </div>
  </section>

  <!-- code が無い/不正なとき join.js が表示する（不正値は一切描画しない） -->
  <section id="invalid" hidden>
    <div class="err-box">
      <p>招待リンクが正しくないみたい。</p>
      <p>招待してくれた友達に「合言葉」を直接聞いて、アプリの<strong>設定 → 合言葉で参加</strong>に入れてね。</p>
    </div>
  </section>

  <!-- 🔴 配布リンク(Yuma 手作業): TestFlight 外部グループの公開リンク発行後、href を
       その URL に差し替える。App Store 一般公開後は
       https://apps.apple.com/jp/app/id6781929046 に戻す。 -->
  <a id="store-link" class="store-btn" href="https://apps.apple.com/jp/app/id6781929046">② アプリを入れる</a>
  <a id="open-app" class="openapp-btn" hidden>アプリを持っている人はこちら（アプリで開く）</a>

  <!-- 手順は常時表示（JS 無効でも参加手段が分かるように静的に置く） -->
  <section id="steps">
    <ol class="steps">
      <li><strong>合言葉をコピー</strong>(上のボタン。アプリを入れる前に!)</li>
      <li>アプリを入れて開き、名前を入れてはじめる</li>
      <li>コピーしてあれば<strong>招待が自動で出るよ</strong>。出ないときは <strong>設定 → 合言葉で参加</strong> に貼り付け</li>
    </ol>
  </section>

  <p class="footnote"><a href="/privacy/">プライバシーポリシー</a></p>

  <script src="/join/join.js"></script>
</body>
</html>
